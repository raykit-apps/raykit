[workspace]
members = [ "crates/raykit-tauri" ]
resolver = "2"

[workspace.package]
authors = [ "raykit-apps" ]
homepage = "https://github.com/raykit-apps/raykit"
repository = "https://github.com/raykit-apps/raykit"
license = "MIT"
edition = "2021"

[workspace.dependencies]
tokio = { version = "1.46.1", default-features = false }
serde = { version = "1", features = [ "derive" ] }
anyhow = "1.0.98"
serde_json = "1"
